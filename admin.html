<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Panel administratora — STOP CYBERPRZEMOCY</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f4f6fb; color: #1a1a1a; padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  .header {
    background: white;
    color: #1F3864;
    padding: 16px 24px;
    border-radius: 12px;
    margin-bottom: 20px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 12px;
    border-bottom: 4px solid #1F3864;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    position: relative;
  }
  .header-logo {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .header-logo img {
    max-height: 60px;
    width: auto;
    display: block;
  }
  .header-right {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    justify-content: center;
  }
  .header h1 { font-size: 1.1rem; font-weight: 700; color: #1F3864; }
  .header .badge {
    background: #1F3864;
    color: white;
    padding: 6px 12px;
    border-radius: 6px; font-size: 0.9rem; font-weight: 600;
  }
  @media (max-width: 600px) {
    .header-logo img { max-height: 45px; }
  }

  .login-screen {
    max-width: 400px; margin: 80px auto; background: white;
    padding: 32px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1);
  }
  .login-screen h2 { color: #1F3864; margin-bottom: 16px; }
  .login-screen input {
    width: 100%; padding: 12px; font-size: 1rem;
    border: 2px solid #D9E2F3; border-radius: 8px; margin-bottom: 12px;
    font-family: inherit;
  }
  .login-screen .info {
    background: #FFF2CC; padding: 12px; border-radius: 6px;
    font-size: 0.85rem; line-height: 1.5; color: #555; margin-bottom: 16px;
  }
  .login-screen .info code {
    background: #fff; padding: 2px 6px; border-radius: 3px;
    font-family: monospace; font-size: 0.85rem;
  }

  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .stat {
    background: white; padding: 16px 20px; border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
  }
  .stat-label { font-size: 0.82rem; color: #777; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 1.7rem; font-weight: 700; color: #1F3864; margin-top: 4px; }

  .toolbar {
    background: white; padding: 16px 20px; border-radius: 10px;
    margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 12px;
    align-items: center; box-shadow: 0 4px 14px rgba(0,0,0,0.06);
  }
  .toolbar input, .toolbar select {
    padding: 10px 14px; font-size: 0.95rem;
    border: 2px solid #D9E2F3; border-radius: 8px; font-family: inherit;
  }
  .toolbar input { flex: 1; min-width: 200px; }
  .btn {
    padding: 10px 18px; background: #2E75B6; color: white;
    border: none; border-radius: 8px; cursor: pointer; font-weight: 600;
    font-family: inherit; font-size: 0.95rem; transition: background 0.2s;
  }
  .btn:hover { background: #1F3864; }
  .btn.green { background: #4A9B6F; }
  .btn.green:hover { background: #2d6a47; }
  .btn.red { background: #C00000; }
  .btn.red:hover { background: #8a0000; }

  .table-wrapper {
    background: white; border-radius: 10px; overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
  }
  .table-scroll { overflow-x: auto; max-height: 65vh; overflow-y: auto; }

  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
  th { font-weight: 600; cursor: pointer; user-select: none; }
  th:hover { background: #2a4d8a; }
  th.sorted-asc::after { content: " ▲"; }
  th.sorted-desc::after { content: " ▼"; }
  tbody tr:hover { background: #f7faff; }
  tbody tr.top1 { background: #fff4d6; }
  tbody tr.top2 { background: #f0f0f0; }
  tbody tr.top3 { background: #fce4d6; }

  .rank { font-weight: 700; color: #1F3864; }
  .wynik {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    background: #2E75B6; color: white; font-weight: 700;
    font-variant-numeric: tabular-nums;

  .wynik.high { background: #4A9B6F; }
  .wynik.low { background: #C00000; }
  .czas { font-variant-numeric: tabular-nums; color: #555; }
  .timeout-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    background: #BF8F00; color: white; font-size: 0.75rem; font-weight: 600;
  }

  .empty-state { text-align: center; padding: 40px; color: #777; }
  .loading { text-align: center; padding: 40px; color: #2E75B6; font-weight: 600; }
  .error-banner {
    background: #ffeaea; color: #8a0000; padding: 14px;
    border-radius: 8px; margin-bottom: 16px; border-left: 4px solid #C00000;
  }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    z-index: 9999; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal {
    background: white; width: min(1100px, 100%); max-height: 90vh; overflow: auto;
    border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }
  .modal-header {
    position: sticky; top: 0; background: white; z-index: 2;
    padding: 18px 22px; border-bottom: 3px solid #1F3864;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;
  }
  .modal-header h2 { color: #1F3864; font-size: 1.15rem; margin-bottom: 4px; }
  .modal-header p { color: #555; font-size: 0.9rem; line-height: 1.4; }
  .modal-body { padding: 18px 22px 24px; }
  .odpowiedz-card {
    border: 1px solid #D9E2F3; border-left: 6px solid #2E75B6;
    border-radius: 10px; padding: 14px; margin-bottom: 12px; background: #F7FAFD;
  }
  .odpowiedz-card.bad { border-left-color: #C00000; background: #fff7f7; }
  .odpowiedz-card.good { border-left-color: #4A9B6F; background: #f6fff9; }
  .odpowiedz-card h3 { font-size: 0.98rem; color: #1F3864; margin-bottom: 8px; line-height: 1.35; }
  .odpowiedz-card p { font-size: 0.9rem; line-height: 1.45; margin: 4px 0; }
  .mini-badge { display:inline-block; padding:2px 8px; border-radius: 999px; font-size:0.78rem; font-weight:700; color:white; }
  .mini-badge.good { background:#4A9B6F; }
  .mini-badge.bad { background:#C00000; }
  .btn.small { padding:6px 10px; font-size:0.8rem; }

  /* ===================== STYLE DRUKU ===================== */
  @media print {
    /* Ukryj wszystko */
    body > #app { display: none !important; }

    /* Pokaż tylko zawartość modalu */
    .modal-overlay {
      position: static !important;
      background: none !important;
      padding: 0 !important;
    }
    .modal {
      box-shadow: none !important;
      border-radius: 0 !important;
      max-height: none !important;
      width: 100% !important;
    }
    /* Ukryj przyciski w druku */
    .modal-header button,
    #drukujModalBtn,
    #zamknijModalBtn { display: none !important; }

    /* Nagłówek druku */
    .modal-header {
      border-bottom: 2px solid #1F3864 !important;
      padding-bottom: 12px !important;
      margin-bottom: 12px !important;
      position: static !important;
    }

    /* Karty odpowiedzi — pełny kolor w druku */
    .odpowiedz-card { break-inside: avoid; }
    .odpowiedz-card.good { background: #f0fff4 !important; border-left-color: #4A9B6F !important; }
    .odpowiedz-card.bad  { background: #fff0f0 !important; border-left-color: #C00000 !important; }
    .mini-badge.good { background: #4A9B6F !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .mini-badge.bad  { background: #C00000 !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    /* Stopka druku */
    .modal-body::after {
      content: "Konkurs STOP CYBERPRZEMOCY — Komenda Miejska Policji w Lublinie";
      display: block;
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid #ccc;
      font-size: 0.8rem;
      color: #777;
      text-align: center;
    }
  }
</style>

// =====================================================================

function $(id) { return document.getElementById(id); }
function escape(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function formatCzas(sek) {
  if (!sek && sek !== 0) return '—';
  const m = Math.floor(sek / 60);
  const s = sek % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function formatData(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleString('pl-PL', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

// =====================================================================
function ekranLogowania() {
  $('app').innerHTML = `
    <div style="max-width:420px; margin:80px auto; background:white;
                padding:36px; border-radius:16px; box-shadow:0 8px 30px rgba(0,0,0,0.12);

          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Zaloguj się przez Google
      </button>
      <p id="loginError" style="color:#C00000; margin-top:16px; font-size:0.88rem; display:none;"></p>

  $('googleBtn').addEventListener('mouseover', () => { $('googleBtn').style.boxShadow = '0 4px 16px rgba(0,0,0,0.15)'; });
  $('googleBtn').addEventListener('mouseout',  () => { $('googleBtn').style.boxShadow = 'none'; });
  $('googleBtn').addEventListener('click', () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ login_hint: ADMIN_EMAIL });
    auth.signInWithPopup(provider)
      .then(result => {
        if (result.user.email !== ADMIN_EMAIL) {
          auth.signOut();
          const err = $('loginError');

        }

          : 'Błąd logowania: ' + err.message;

}

// =====================================================================
// PANEL GŁÓWNY
// =====================================================================

    <div class="header">

    <div class="stats" id="stats"></div>

    <div class="toolbar">

      <button class="btn green" id="eksportBtn">📥 Eksport CSV (Excel)</button>

  $('wylogujBtn').addEventListener('click', () => {

  });
  $('eksportBtn').addEventListener('click', eksportCSV);
  $('eksportSzczegolowyBtn').addEventListener('click', eksportSzczegolowyCSV);

  $('usunZaznaczoneBtn').addEventListener('click', usunZaznaczone);
  $('usunWszystkoBtn').addEventListener('click', usunWszystko);
  $('szukaj').addEventListener('input', e => { filtrSzukaj = e.target.value.toLowerCase(); renderuj(); });

// =====================================================================
// POBIERANIE DANYCH
// =====================================================================
function pobierzWyniki() {
  $('status').textContent = '⏳ Pobieranie...';
  $('wynikiTbody').innerHTML = '<tr><td colspan="11" class="loading">⏳ Pobieranie wyników...</td></tr>';

  db.ref('wyniki').once('value')
    .then(snap => {
      const dane = snap.val() || {};
      wszystkieWyniki = Object.entries(dane).map(([id, w]) => ({ id, ...w }));
      $('status').textContent = `✅ Połączono — ${wszystkieWyniki.length} wpisów`;
      aktualizujListeSzkol();
      aktualizujStaty();
      renderuj();
    })
    .catch(err => {
      console.error(err);
      $('status').textContent = '❌ Błąd połączenia';
      $('wynikiTbody').innerHTML = `
        <tr><td colspan="11">
          <div class="error-banner">
            <strong>Błąd dostępu do bazy:</strong> ${escape(err.message)}<br><br>
            <strong>Co zrobić?</strong><br>
            Aby panel admina mógł czytać dane, musisz tymczasowo zmienić reguły Firebase na tryb odczytu z hasłem
            (patrz README). Najprostszy sposób: zmień <code>".read": false</code> na <code>".read": true</code>
            podczas pracy z panelem, a po zakończeniu wróć do <code>false</code>.
          </div>
        </td></tr>
      `;
    });
}

function aktualizujListeSzkol() {
  // === FILTR po pełnej nazwie ===
  const szkoly = [...new Set(wszystkieWyniki.map(w => w.szkola).filter(Boolean))].sort();
  const sel = $('filtrSzkola');
  sel.innerHTML = '<option value="">Wszystkie pełne nazwy (' + wszystkieWyniki.length + ')</option>' +
    szkoly.map(s => {
      const ile = wszystkieWyniki.filter(w => w.szkola === s).length;
      return `<option value="${escape(s)}">${escape(s)} (${ile})</option>`;
    }).join('');
  if (filtrSzkola) sel.value = filtrSzkola;

  // === FILTR po NUMERZE szkoły (najważniejsze do liczenia rankingu) ===
  const numery = [...new Set(wszystkieWyniki.map(w => w.szkolaNumer).filter(n => n && String(n).trim() !== ''))]
    .sort((a, b) => parseInt(a, 10) - parseInt(b, 10));
  const selNr = $('filtrSzkolaNumer');
  // Dodajemy też pozycję dla "bez numeru"
  const bezNumeru = wszystkieWyniki.filter(w => !w.szkolaNumer || String(w.szkolaNumer).trim() === '').length;
  let optNumery = '<option value="">📊 Wszystkie numery szkół (' + wszystkieWyniki.length + ')</option>';
  numery.forEach(n => {
    const ile = wszystkieWyniki.filter(w => String(w.szkolaNumer) === String(n)).length;
    optNumery += `<option value="${escape(n)}">SP nr ${escape(n)} (${ile} uczniów)</option>`;
  });
  if (bezNumeru > 0) {
    optNumery += `<option value="__BRAK__">⚠️ Bez numeru (${bezNumeru} uczniów)</option>`;
  }
  selNr.innerHTML = optNumery;
  if (filtrSzkolaNumer) selNr.value = filtrSzkolaNumer;
}

function aktualizujStaty() {
  const liczba = wszystkieWyniki.length;
  const szkolyTekstem = new Set(wszystkieWyniki.map(w => w.szkola).filter(Boolean)).size;
  const szkolyPoNumerze = new Set(
    wszystkieWyniki.map(w => w.szkolaNumer).filter(n => n && String(n).trim() !== '')
  ).size;
  const ukonczone = wszystkieWyniki.filter(w => w.powodZakonczenia === 'completed').length;
  const sredniWynik = liczba > 0
    ? (wszystkieWyniki.reduce((s,w) => s + (w.wynik || 0), 0) / liczba).toFixed(1)
    : 0;
  const najlepszy = liczba > 0 ? Math.max(...wszystkieWyniki.map(w => w.wynik || 0)) : 0;

  $('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Uczestników</div><div class="stat-value">${liczba}</div></div>
    <div class="stat"><div class="stat-label">Unikalnych szkół (po numerze)</div><div class="stat-value">${szkolyPoNumerze}</div></div>
    <div class="stat"><div class="stat-label">Pełnych nazw szkół</div><div class="stat-value">${szkolyTekstem}</div></div>
    <div class="stat"><div class="stat-label">Ukończyło</div><div class="stat-value">${ukonczone}</div></div>
    <div class="stat"><div class="stat-label">Średni wynik</div><div class="stat-value">${sredniWynik} / 30</div></div>
    <div class="stat"><div class="stat-label">Najlepszy wynik</div><div class="stat-value">${najlepszy} / 30</div></div>
  `;
}

// =====================================================================
// RENDEROWANIE TABELI
// =====================================================================
function renderuj() {
  let dane = [...wszystkieWyniki];

  // Filtr szkoły (pełna nazwa)
  if (filtrSzkola) dane = dane.filter(w => w.szkola === filtrSzkola);

  // Filtr po NUMERZE szkoły
  if (filtrSzkolaNumer === '__BRAK__') {
    dane = dane.filter(w => !w.szkolaNumer || String(w.szkolaNumer).trim() === '');
  } else if (filtrSzkolaNumer) {
    dane = dane.filter(w => String(w.szkolaNumer) === String(filtrSzkolaNumer));
  }

  // Filtr szukaj
  if (filtrSzukaj) {
    dane = dane.filter(w =>
      (w.imie || '').toLowerCase().includes(filtrSzukaj) ||
      (w.nazwisko || '').toLowerCase().includes(filtrSzukaj) ||
      (w.szkola || '').toLowerCase().includes(filtrSzukaj) ||
      (w.klasa || '').toLowerCase().includes(filtrSzukaj)
    );
  }

  // Sortowanie
  const k = aktualneSortowanie.kolumna;
  const kier = aktualneSortowanie.kierunek === 'asc' ? 1 : -1;

  if (k === 'wynik_czas' || k === 'rank') {
    // Domyślne sortowanie konkursowe: najpierw wynik DESC, potem czas ASC
    dane.sort((a,b) => {
      const wa = a.wynik || 0, wb = b.wynik || 0;
      if (wa !== wb) return wb - wa;
      return (a.czasRozwiazywaniaSekund || 999999) - (b.czasRozwiazywaniaSekund || 999999);
    });
  } else if (k === 'wynik') {
    dane.sort((a,b) => ((a.wynik || 0) - (b.wynik || 0)) * kier);
  } else if (k === 'czas') {
    dane.sort((a,b) => ((a.czasRozwiazywaniaSekund || 999999) - (b.czasRozwiazywaniaSekund || 999999)) * kier);
  } else if (k === 'data') {
    dane.sort((a,b) => ((a.timestamp || 0) - (b.timestamp || 0)) * kier);
  } else if (k === 'szkolaNumer') {
    // Sortowanie numerycznie - 5 przed 23, nie alfabetycznie
    dane.sort((a,b) => {
      const na = parseInt(a.szkolaNumer, 10) || 999999;
      const nb = parseInt(b.szkolaNumer, 10) || 999999;
      return (na - nb) * kier;
    });
  } else {
    dane.sort((a,b) => String(a[k] || '').localeCompare(String(b[k] || ''), 'pl') * kier);
  }

  // Aktualizuj nagłówki
  document.querySelectorAll('th').forEach(th => {
    th.classList.remove('sorted-asc', 'sorted-desc');
    if (th.dataset.sort === k) {
      th.classList.add(aktualneSortowanie.kierunek === 'asc' ? 'sorted-asc' : 'sorted-desc');
    }
  });

  // Render
  if (dane.length === 0) {
    $('wynikiTbody').innerHTML = '<tr><td colspan="11" class="empty-state">Brak wyników do wyświetlenia.</td></tr>';
    return;
  }

  $('wynikiTbody').innerHTML = dane.map((w, i) => {
    const wynik = w.wynik || 0;
    const wynikClass = wynik >= 24 ? 'high' : wynik <= 14 ? 'low' : '';
    const trClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const timeout = w.powodZakonczenia === 'timeout';
    const nrSzkoly = w.szkolaNumer && String(w.szkolaNumer).trim() !== ''
      ? `<strong style="color:#1F3864;">${escape(w.szkolaNumer)}</strong>`
      : '<span style="color:#BF8F00;" title="Uczeń nie podał numeru w nazwie">⚠️</span>';
    return `
      <tr class="${trClass}">
        <td class="rank">${i + 1}</td>
        <td><strong>${escape(w.nazwisko)}</strong></td>
        <td>${escape(w.imie)}</td>
        <td style="text-align:center;">${nrSzkoly}</td>
        <td>${escape(w.szkola)}</td>
        <td>${escape(w.klasa)}</td>
        <td><span class="wynik ${wynikClass}">${wynik}/${w.liczbaPytan || 30}</span></td>
        <td class="czas">${formatCzas(w.czasRozwiazywaniaSekund)}</td>
        <td>${formatData(w.timestamp)}</td>
        <td>${timeout ? '<span class="timeout-badge">⏱️ Timeout</span>' : '✅ Ukończone'}</td>
        <td>
          <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <input type="checkbox" data-id="${escape(w.id)}" class="zaznaczChk" ${zaznaczoneIds.has(w.id) ? 'checked' : ''}>
            <button class="btn small podglad-odpowiedzi" data-id="${escape(w.id)}">Podgląd</button>
            <button class="btn red small usun-jeden" data-id="${escape(w.id)}">Usuń</button>
          </div>
        </td>
      </tr>
    `;
  }).join('');

  document.querySelectorAll('.zaznaczChk').forEach(chk => {
    chk.addEventListener('change', e => {
      const id = e.target.dataset.id;
      if (e.target.checked) zaznaczoneIds.add(id); else zaznaczoneIds.delete(id);
    });
  });

  document.querySelectorAll('.usun-jeden').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.target.dataset.id;
      usunJeden(id);
    });
  });

  document.querySelectorAll('.podglad-odpowiedzi').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = e.target.dataset.id;
      pokazOdpowiedzi(id);
    });
  });
}

function pokazOdpowiedzi(id) {
  const w = wszystkieWyniki.find(x => x.id === id);
  if (!w) return alert('Nie znaleziono wpisu. Odśwież panel i spróbuj ponownie.');

  const szczegoly = Array.isArray(w.szczegolyOdpowiedzi) ? w.szczegolyOdpowiedzi : [];
  const naglowek = `
    <div>
      <h2>Podgląd odpowiedzi: ${escape(w.imie)} ${escape(w.nazwisko)}</h2>
      <p>
        Szkoła: <strong>${escape(w.szkola)}</strong> | Klasa: <strong>${escape(w.klasa)}</strong> | 
        Wynik: <strong>${escape(w.wynik || 0)}/${escape(w.liczbaPytan || 30)}</strong> | 
        Czas: <strong>${formatCzas(w.czasRozwiazywaniaSekund)}</strong>
      </p>
    </div>
  `;

  let tresc = '';
  if (szczegoly.length === 0) {
    tresc = `
      <div class="error-banner">
        Ten wpis nie ma jeszcze zapisanych szczegółowych odpowiedzi. To normalne dla wyników zapisanych przed aktualizacją pliku <code>index.html</code>.
      </div>
    `;
  } else {
    tresc = szczegoly.map((o, i) => {
      const ok = !!o.czyPoprawna;
      return `
        <div class="odpowiedz-card ${ok ? 'good' : 'bad'}">
          <h3>${i + 1}. [Pytanie nr ${escape(o.nrPytania)}] ${escape(o.tresc)}</h3>
          <p><span class="mini-badge ${ok ? 'good' : 'bad'}">${ok ? 'POPRAWNA' : 'BŁĘDNA'}</span></p>
          <p><strong>Odpowiedź ucznia:</strong> ${escape(o.wybranaOdpowiedzTekst || 'brak odpowiedzi')}</p>
          <p><strong>Poprawna odpowiedź:</strong> ${escape(o.poprawnaOdpowiedzTekst || '')}</p>
        </div>
      `;
    }).join('');
  }

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modalOdpowiedzi';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        ${naglowek}
        <div style="display:flex; gap:8px; flex-shrink:0;">
          <button class="btn" id="drukujModalBtn" style="background:#1F3864;">🖨️ Drukuj</button>
          <button class="btn red" id="zamknijModalBtn">Zamknij</button>
        </div>
      </div>
      <div class="modal-body">${tresc}</div>
    </div>
  `;
  document.body.appendChild(overlay);
  $('zamknijModalBtn').addEventListener('click', zamknijModal);
  $('drukujModalBtn').addEventListener('click', () => window.print());
  overlay.addEventListener('click', e => { if (e.target === overlay) zamknijModal(); });
}

function zamknijModal() {
  const modal = $('modalOdpowiedzi');
  if (modal) modal.remove();
}

function usunJeden(id) {
  if (!id) return;
  if (!confirm('Na pewno usunąć ten wpis? Tej operacji nie można cofnąć.')) return;
  db.ref('wyniki/' + id).remove()
    .then(() => {
      zaznaczoneIds.delete(id);
      pobierzWyniki();
    })
    .catch(err => alert('Błąd usuwania: ' + err.message));
}

function usunZaznaczone() {
  const ids = [...zaznaczoneIds];
  if (ids.length === 0) {
    alert('Nie zaznaczono żadnych wpisów.');
    return;
  }
  if (!confirm(`Usunąć ${ids.length} zaznaczonych wpisów? Tej operacji nie można cofnąć.`)) return;

  Promise.all(ids.map(id => db.ref('wyniki/' + id).remove()))
    .then(() => {
      zaznaczoneIds.clear();
      pobierzWyniki();
    })
    .catch(err => alert('Błąd usuwania: ' + err.message));
}

function usunWszystko() {
  const potwierdzenie = prompt('Aby usunąć WSZYSTKIE wpisy, wpisz dokładnie: USUN WSZYSTKO');
  if (potwierdzenie !== 'USUN WSZYSTKO') {
    alert('Anulowano usuwanie.');
    return;
  }
  db.ref('wyniki').remove()
    .then(() => {
      zaznaczoneIds.clear();
      pobierzWyniki();
    })
    .catch(err => alert('Błąd usuwania: ' + err.message));
}

// =====================================================================
// EKSPORT CSV
// =====================================================================
function eksportCSV() {
  if (wszystkieWyniki.length === 0) {
    alert('Brak danych do eksportu');
    return;
  }

  // Sortuj jak w rankingu
  const dane = [...wszystkieWyniki].sort((a,b) => {
    const wa = a.wynik || 0, wb = b.wynik || 0;
    if (wa !== wb) return wb - wa;
    return (a.czasRozwiazywaniaSekund || 999999) - (b.czasRozwiazywaniaSekund || 999999);
  });

  const naglowki = [
    'Miejsce', 'Nazwisko', 'Imię', 'Nr szkoły', 'Pełna nazwa szkoły', 'Klasa',
    'Wynik (pkt)', 'Liczba pytań', 'Liczba odpowiedzi',
    'Czas rozwiązywania (sekundy)', 'Czas (min:sek)',
    'Data wysłania', 'Powód zakończenia'
  ];

  const wiersze = dane.map((w, i) => [
    i + 1,
    w.nazwisko || '',
    w.imie || '',
    w.szkolaNumer || '',
    w.szkola || '',
    w.klasa || '',
    w.wynik || 0,
    w.liczbaPytan || 30,
    w.liczbaOdpowiedzianych || 0,
    w.czasRozwiazywaniaSekund || '',
    formatCzas(w.czasRozwiazywaniaSekund),
    formatData(w.timestamp),
    w.powodZakonczenia === 'timeout' ? 'Timeout (czas się skończył)' : 'Ukończone normalnie'
  ]);

  // Ekranowanie CSV
  const csv = [naglowki, ...wiersze]
    .map(row => row.map(cell => {
      const s = String(cell);
      if (s.includes(';') || s.includes('"') || s.includes('\n')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }).join(';'))
    .join('\n');

  // BOM dla Excela (poprawne polskie znaki)
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const dataStr = new Date().toISOString().slice(0, 10);
  a.download = `STOP_CYBERPRZEMOCY_wyniki_${dataStr}.csv`;
  a.click();
}

function eksportSzczegolowyCSV() {
  if (wszystkieWyniki.length === 0) {
    alert('Brak danych do eksportu');
    return;
  }

  const dane = [...wszystkieWyniki].sort((a,b) => {
    const wa = a.wynik || 0, wb = b.wynik || 0;
    if (wa !== wb) return wb - wa;
    return (a.czasRozwiazywaniaSekund || 999999) - (b.czasRozwiazywaniaSekund || 999999);
  });

  const naglowki = [
    'Miejsce', 'Nazwisko', 'Imię', 'Nr szkoły', 'Pełna nazwa szkoły', 'Klasa',
    'Wynik (pkt)', 'Liczba pytań', 'Czas (min:sek)', 'Data wysłania',
    'Kolejność w teście', 'Nr pytania', 'Treść pytania',
    'Odpowiedź ucznia', 'Poprawna odpowiedź', 'Czy poprawna'
  ];

  const wiersze = [];
  dane.forEach((w, idx) => {
    const szczegoly = Array.isArray(w.szczegolyOdpowiedzi) ? w.szczegolyOdpowiedzi : [];
    if (szczegoly.length === 0) {
      wiersze.push([
        idx + 1, w.nazwisko || '', w.imie || '', w.szkolaNumer || '', w.szkola || '', w.klasa || '',
        w.wynik || 0, w.liczbaPytan || 30, formatCzas(w.czasRozwiazywaniaSekund), formatData(w.timestamp),
        '', '', 'Brak szczegółowych odpowiedzi — wpis zapisany przed aktualizacją', '', '', ''
      ]);
      return;
    }

    szczegoly.forEach(o => {
      wiersze.push([
        idx + 1,
        w.nazwisko || '',
        w.imie || '',
        w.szkolaNumer || '',
        w.szkola || '',
        w.klasa || '',
        w.wynik || 0,
        w.liczbaPytan || 30,
        formatCzas(w.czasRozwiazywaniaSekund),
        formatData(w.timestamp),
        o.kolejnoscWPodejsciu || '',
        o.nrPytania || '',
        o.tresc || '',
        o.wybranaOdpowiedzTekst || 'brak odpowiedzi',
        o.poprawnaOdpowiedzTekst || '',
        o.czyPoprawna ? 'TAK' : 'NIE'
      ]);
    });
  });

  const csv = [naglowki, ...wiersze]
    .map(row => row.map(cell => {
      const s = String(cell == null ? '' : cell);
      if (s.includes(';') || s.includes('"') || s.includes('\n')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }).join(';'))
    .join('\n');

  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const dataStr = new Date().toISOString().slice(0, 10);
  a.download = `STOP_CYBERPRZEMOCY_odpowiedzi_szczegolowe_${dataStr}.csv`;
  a.click();
}
