<script>
// =====================================================================
// KONFIGURACJA FIREBASE

const firebaseConfig = {
  apiKey: "AIzaSyAxB9B9DqBawZkBru_hv-_SvYBqMMnQOEI",

  projectId: "stop-cyberprzemocy-2026",
  storageBucket: "stop-cyberprzemocy-2026.firebasestorage.app",
  messagingSenderId: "423372511131",
  appId: "1:423372511131:web:0a69827b4da0b4e8a1333e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// =====================================================================
// PARAMETRY
// =====================================================================
const CZAS_TESTU_SEKUND = 30 * 60; // 30 minut
let stan = {
  uczen: null,
  pytaniaPomieszane: [],
  aktualnePytanie: 0,
  odpowiedzi: [],
  startTime: null,
  timerInterval: null,
  pozostaloSekund: CZAS_TESTU_SEKUND,
  zakonczono: false
};

// =====================================================================
// HELPERY
// =====================================================================
function $(id) { return document.getElementById(id); }
function escape(s) {
  // 1. Najpierw escape HTML (bezpieczeństwo)
  let escaped = String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  // 2. Usuwanie bekartów (sierot) - polskie litery jednoznakowe
  // Zamienia spację po: a, i, o, u, w, z, A, I, O, U, W, Z na niełamliwą spację
  escaped = escaped.replace(/(\s|^)([aiouwzAIOUWZ])\s+/g, '$1$2\u00A0');
  return escaped;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Wyciąga numer szkoły z dowolnego tekstu wpisanego przez ucznia.
// Obsługuje: "SP 23", "sp nr 23", "Szkoła Podstawowa nr 23 im. Jana Pawła II",
//            "23", "nr 23", "sp.23", "SP-23", "szk. podst. 23".
// Strategia: szuka liczby, ale ignoruje liczby będące rokiem (1900-2099)
// oraz liczby pojawiające się PO słowach typu "im.", "klasy", "nr klasy".
// Zwraca string z numerem (np. "23") lub null, jeśli nie znaleziono.
function wyodrebnijNumerSzkoly(tekst) {
  if (!tekst) return null;
  const t = String(tekst).toLowerCase().trim();

  // Odetnij wszystko, co jest po słowach kończących nazwę szkoły
  // (np. "SP 23 im. Jana Pawła II" -> "SP 23")
  const stopWords = /\s+(im\.?|imienia|w\s+|przy|ul\.|ulica)\b/i;
  const obciety = t.split(stopWords)[0];

  // Znajdź wszystkie liczby
  const liczby = obciety.match(/\d+/g);
  if (!liczby || liczby.length === 0) return null;

  // Odfiltruj lata (1900-2099)
  const sensowne = liczby.filter(n => {
    const num = parseInt(n, 10);
    return !(num >= 1900 && num <= 2099);
  });

  if (sensowne.length === 0) return null;

  // Zwróć pierwszą sensowną liczbę (zwykle to jest numer szkoły)
  return sensowne[0];
}

function pomieszajPytania() {
  // Losuj kolejność pytań
  const wymieszane = shuffle(PYTANIA);
  // I dla każdego pytania pomieszaj odpowiedzi (zapisując nowy index poprawnej)
  return wymieszane.map(p => {
    const indices = [0,1,2,3];
    const shuffledIdx = shuffle(indices);
    const noweOdpowiedzi = shuffledIdx.map(i => p.a[i]);
    const nowyIndexPoprawnej = shuffledIdx.indexOf(p.k);
    return { nr: p.nr, t: p.t, a: noweOdpowiedzi, k: nowyIndexPoprawnej };
  });
}

function formatCzas(sek) {
  const m = Math.floor(sek / 60);
  const s = sek % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// =====================================================================
// EKRAN STARTOWY
// =====================================================================
function ekranStartowy() {
  $('content').innerHTML = `
    <div class="start-screen">
      <h2>Witaj w&nbsp;konkursie!</h2>
      <p class="subtitle">Test wiedzy o&nbsp;bezpieczeństwie w&nbsp;internecie</p>

      <div class="info-box">
        <h3>📋 Zasady konkursu</h3>
        <ul>
          <li>Test składa się z&nbsp;30 pytań (jednokrotnego wyboru)</li>
          <li>Masz <strong>30 minut</strong> na rozwiązanie wszystkich pytań</li>
          <li>Po przejściu do kolejnego pytania <strong>nie możesz wrócić</strong></li>
          <li>Po upływie czasu test zostanie zakończony automatycznie</li>
          <li>Nie odświeżaj strony — stracisz swój postęp</li>
        </ul>
      </div>

      <div class="form-group">
        <label for="imie">Imię *</label>
        <input type="text" id="imie" autocomplete="given-name" maxlength="30" placeholder="np. Jan">
      </div>
      <div class="form-group">
        <label for="nazwisko">Nazwisko *</label>
        <input type="text" id="nazwisko" autocomplete="family-name" maxlength="40" placeholder="np. Kowalski">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="szkola">Nazwa szkoły *</label>
          <input type="text" id="szkola" maxlength="80" placeholder="np. SP nr 5 w Lublinie">
          <small style="display:block; color:#777; font-size:0.82rem; margin-top:4px;">
            ⚠️ Pamiętaj, żeby podać <strong>numer</strong> swojej szkoły (np. 5, 23)
          </small>
        </div>
        <div class="form-group">
          <label for="klasa">Klasa *</label>
          <input type="text" id="klasa" maxlength="10" placeholder="np. 4A">
        </div>
      </div>

      <button class="btn" id="startBtn">▶️ Rozpocznij test</button>

      <div class="legal-note">
        Klikając „Rozpocznij test" potwierdzasz, że wyraziłeś/aś (Twoi rodzice/opiekunowie) zgodę na udział w konkursie i przetwarzanie podanych danych
        (imię, nazwisko, szkoła, klasa) wyłącznie w celu organizacji konkursu „STOP CYBERPRZEMOCY" przez KMP w Lublinie.
        Dane będą przechowywane do zakończenia konkursu i ogłoszenia laureatów, a następnie usunięte.
      </div>
    </div>
  `;
  $('startBtn').addEventListener('click', rozpocznijTest);
}

function rozpocznijTest() {
  const imie = $('imie').value.trim();
  const nazwisko = $('nazwisko').value.trim();
  const szkola = $('szkola').value.trim();
  const klasa = $('klasa').value.trim();

  // Walidacja
  let ok = true;
  // Imię, nazwisko, szkoła - minimum 2 znaki
  // Klasa - minimum 1 znak (bo może być "4", "5" itd.)
  [['imie', imie, 2], ['nazwisko', nazwisko, 2], ['szkola', szkola, 1], ['klasa', klasa, 1]].forEach(([id, val, minLen]) => {
    if (val.length < minLen) { $(id).classList.add('error'); ok = false; }
    else $(id).classList.remove('error');
  });
  if (!ok) {
    alert('Uzupełnij wszystkie pola.\n\nImię, nazwisko i szkoła - minimum 2 znaki.\nKlasa - minimum 1 znak (np. "4" lub "4A").');
    return;
  }

  stan.uczen = {
    imie,
    nazwisko,
    szkola,
    szkolaNumer: wyodrebnijNumerSzkoly(szkola),
    klasa
  };
  stan.pytaniaPomieszane = pomieszajPytania();
  stan.aktualnePytanie = 0;
  stan.odpowiedzi = [];
  stan.startTime = Date.now();
  stan.pozostaloSekund = CZAS_TESTU_SEKUND;

  // Anti-refresh
  window.addEventListener('beforeunload', uniemozliwOdswiezanie);

  // Pokaz timer
  $('timer').style.display = 'block';
  uruchomTimer();

  pokazPytanie();
}

function uniemozliwOdswiezanie(e) {
  if (stan.zakonczono) return;
  e.preventDefault();
  e.returnValue = 'Czy na pewno chcesz opuścić test? Stracisz swój postęp!';
  return e.returnValue;
}

// =====================================================================
// TIMER
// =====================================================================
function uruchomTimer() {
  const el = $('timer');
  const aktualizuj = () => {
    el.textContent = formatCzas(stan.pozostaloSekund);
    el.classList.remove('warning', 'critical');
    if (stan.pozostaloSekund <= 60) el.classList.add('critical');
    else if (stan.pozostaloSekund <= 300) el.classList.add('warning');
  };
  aktualizuj();

  stan.timerInterval = setInterval(() => {
    stan.pozostaloSekund--;
    aktualizuj();
    if (stan.pozostaloSekund <= 0) {
      clearInterval(stan.timerInterval);
      zakonczTest('timeout');
    }
  }, 1000);
}

// =====================================================================
// PYTANIE
// =====================================================================
function pokazPytanie() {
  const idx = stan.aktualnePytanie;
  const p = stan.pytaniaPomieszane[idx];
  const procent = Math.round(((idx) / stan.pytaniaPomieszane.length) * 100);

  $('content').innerHTML = `
    <div class="progress-info">
      <span>Pytanie <strong>${idx + 1}</strong> z <strong>${stan.pytaniaPomieszane.length}</strong></span>
      <span>${procent}% ukończone</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${procent}%"></div></div>
    <div class="question-text">${escape(p.t)}</div>
    <div class="answers" id="answers">
      ${p.a.map((odp, i) => `
        <label class="answer" data-idx="${i}">
          <span class="answer-letter">${String.fromCharCode(65 + i)}</span>
          <input type="radio" name="odp" value="${i}">
          <span class="answer-text">${escape(odp)}</span>
        </label>
      `).join('')}
    </div>
    <div class="nav-buttons">
      <button class="btn" id="dalejBtn" disabled>
        ${idx === stan.pytaniaPomieszane.length - 1 ? '🏁 Zakończ test' : 'Dalej ▶️'}
      </button>
    </div>
  `;

  // Klik na odpowiedź
  document.querySelectorAll('.answer').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.answer').forEach(a => a.classList.remove('selected'));
      el.classList.add('selected');
      el.querySelector('input').checked = true;
      $('dalejBtn').disabled = false;
    });
  });

  $('dalejBtn').addEventListener('click', dalej);
}

function dalej() {
  const wybrana = document.querySelector('input[name="odp"]:checked');
  if (!wybrana) return;
  stan.odpowiedzi.push(parseInt(wybrana.value));
  stan.aktualnePytanie++;

  if (stan.aktualnePytanie >= stan.pytaniaPomieszane.length) {
    zakonczTest('completed');
  } else {
    pokazPytanie();
  }
}

// =====================================================================
// ZAKOŃCZENIE TESTU + ZAPIS
// =====================================================================
function zakonczTest(powod) {
  stan.zakonczono = true;
  if (stan.timerInterval) clearInterval(stan.timerInterval);
  window.removeEventListener('beforeunload', uniemozliwOdswiezanie);
  $('timer').style.display = 'none';

  // Oblicz wynik
  let wynik = 0;
  stan.pytaniaPomieszane.forEach((p, i) => {
    if (stan.odpowiedzi[i] === p.k) wynik++;
  });

  const czasRozwiazywaniaSekund = Math.round((Date.now() - stan.startTime) / 1000);
  const liczbaOdpowiedzi = stan.odpowiedzi.length;

  // Przygotuj dane do zapisu
  const dane = {
    imie: stan.uczen.imie,
    nazwisko: stan.uczen.nazwisko,
    szkola: stan.uczen.szkola,
    szkolaNumer: stan.uczen.szkolaNumer || '', // pusty string jeśli brak numeru
    klasa: stan.uczen.klasa,
    wynik: wynik,
    liczbaPytan: stan.pytaniaPomieszane.length,
    liczbaOdpowiedzianych: liczbaOdpowiedzi,
    czasRozwiazywaniaSekund: czasRozwiazywaniaSekund,
    powodZakonczenia: powod, // 'completed' lub 'timeout'
    // Szczegółowy zapis odpowiedzi ucznia — widoczny później w panelu administratora
    szczegolyOdpowiedzi: stan.pytaniaPomieszane.map((p, i) => ({
      kolejnoscWPodejsciu: i + 1,
      nrPytania: p.nr,
      tresc: p.t,
      odpowiedzi: p.a,
      wybranaOdpowiedzIndex: stan.odpowiedzi[i] ?? null,
      wybranaOdpowiedzTekst: stan.odpowiedzi[i] != null ? p.a[stan.odpowiedzi[i]] : '',
      poprawnaOdpowiedzIndex: p.k,
      poprawnaOdpowiedzTekst: p.a[p.k],
      czyPoprawna: stan.odpowiedzi[i] === p.k
    })),
    timestamp: firebase.database.ServerValue.TIMESTAMP,
    dataLokalna: new Date().toISOString()
  };

  // Komunikat na ekranie
  const tekstPowodu = powod === 'timeout'
    ? '<p style="color:#BF8F00; font-weight:600;">⏱️ Czas się skończył — Twoje odpowiedzi zostały zapisane.</p>'
    : '';

  $('content').innerHTML = `
    <div class="end-screen">
      <div class="icon">✅</div>
      <h2>Dziękujemy za udział!</h2>
      ${tekstPowodu}
      <p>Twoje odpowiedzi zostały zarejestrowane.<br>
      <strong>Laureaci konkursu zostaną ogłoszeni przez Twoją szkołę / organizatora.</strong></p>
      <p id="status" class="saving">⏳ Zapisywanie odpowiedzi...</p>
    </div>
  `;

  // Zapis do Firebase
  zapiszWynik(dane);
}

function zapiszWynik(dane, proba = 1) {
  db.ref('wyniki').push(dane)
    .then(() => {
      $('status').className = 'saved';
      $('status').textContent = '✅ Odpowiedzi zostały zapisane. Możesz zamknąć tę kartę.';
    })
    .catch(err => {
      console.error('Błąd zapisu:', err);
      if (proba < 3) {
        // Spróbuj ponownie po 2 sekundach
        $('status').textContent = `⏳ Próba zapisu ${proba + 1}/3...`;
        setTimeout(() => zapiszWynik(dane, proba + 1), 2000);
      } else {
        // Awaria - pokaż info i pozwól pobrać dane lokalnie
        $('content').innerHTML += `
          <div class="save-error">
            <strong>⚠️ Wystąpił problem z zapisem online.</strong><br>
            Pobierz plik wynikowy i przekaż go nauczycielowi lub organizatorowi.
          </div>
          <button class="btn" id="pobierzBtn">📥 Pobierz wynik (plik JSON)</button>
        `;
        $('pobierzBtn').addEventListener('click', () => {
          const blob = new Blob([JSON.stringify(dane, null, 2)], {type:'application/json'});
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `wynik_${dane.nazwisko}_${dane.imie}_${Date.now()}.json`;
          a.click();
        });
      }
    });
}

ekranStartowy();
</script>
</body>
